seed: 7
device: auto
dtype: float16
num_images_per_prompt: 8  # More images for variety
output_dir: outputs/task_a/compare_inputs

model:
  name: sdxl
  model_id: stabilityai/stable-diffusion-xl-base-1.0
  family: sdxl
  height: 1024
  width: 1024
  guidance_scale: 6.0
  num_inference_steps: 30

image_path: inputs/style_input.jpg

captions:
  - "A blurry photo of a hand holing a food can, taken with a low-quality camera, with poor lighting and out of focus"

modes:
  - caption_only
  - caption_and_image

negative_prompt: "extra fingers, watermark, high quality, cartoon, drawing"
