seed: 11
device: auto
dtype: float16
model:
  name: sdxl
  model_id: stabilityai/stable-diffusion-xl-base-1.0
  family: sdxl

height: 512
width: 512
output_dir: outputs/task_b

base_prompt: "a realistic low-light photo of everyday objects on a kitchen table, slight blur, cluttered composition, VizWiz style"
negative_prompt: "cartoon, painting, extra fingers, deformed objects, duplicate items, watermark, unreadable text, oversaturated colors"

schedulers:
  - ddim
  - ddpm

guidance_scales:
  - 3.0
  - 7.5
  - 12.0

num_inference_steps:
  - 10
  - 30
  - 60

prompt_modes:
  - positive_only
  - positive_and_negative
