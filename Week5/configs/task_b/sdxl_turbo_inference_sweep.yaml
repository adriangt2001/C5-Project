seed: 11
device: auto
dtype: float16
model:
  name: sdxl_turbo
  model_id: stabilityai/sdxl-turbo
  family: sdxl

height: 1024
width: 1024
output_dir: outputs/task_b

base_prompt: “A poorly framed, low-quality photo of a medicine bottle on a cluttered bathroom counter, taken by a visually impaired person using a smartphone, with the object partially cut off at the edge of the frame, heavy motion blur from shaky hands, and the camera focused on the background instead of the bottle. The image is captured under very dim indoor lighting, making most of the scene dark and noisy, while a harsh flash creates glare on the plastic surface, obscuring the label text. A finger is partially covering the corner of the lens, and several other objects like toothbrushes and containers overlap and block parts of the bottle, making it difficult to identify.”
negative_prompt: “cartoon, painting, extra fingers, deformed objects, duplicate items, watermark, unreadable text, oversaturated colors”

schedulers:
  - ddim
  - ddpm

guidance_scales:
  - 0.0
  - 0.5
  - 1.0
  - 1.5
  - 2.0

num_inference_steps:
  - 1
  - 2
  - 3
  - 4
  - 5
  - 6
  - 8
  - 10

prompt_modes:
  - positive_only
  - positive_and_negative

strengths:
  - 0.5
  - 0.7
  - 0.9
  - 1.0

num_images_per_prompt:
  - 1
  - 3
  - 5
